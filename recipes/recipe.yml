# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

# image will be published to ghcr.io/<user>/<name>
name: wayblue-nvidia-muskoxen
# description will be included in the image's metadata
description: Customized wayblue/niri-nvidia-open with dx tools

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/wayblueorg/niri-nvidia-open
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* into your image's root folder /

  - type: dnf
    repos:
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
        - https://repo.fortinet.com/repo/forticlient/8.0/el/os/x86_64/fortinet.repo
      keys:
        - https://download.docker.com/linux/fedora/gpg
        - https://repo.fortinet.com/repo/forticlient/8.0/el/os/x86_64/RPM-GPG-KEY
      copr:
        - atim/starship
        - tofik/nwg-shell # provides nwg-look, not in official Fedora repos
    install:
      packages:
        - micro
        - starship # shell
        - helix # cli ide
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        - mangohud # Performance, FPS, and hardware monitoring overlay
        - noctalia # Noctalia v5, native C++/OpenGL ES shell for niri — in default Fedora 44+ repos
        - git # needed at build time to fetch the SDDM theme, see script module below
        - git-lfs
        - xdg-desktop-portal-gtk # fixes Flatpak "Save As" dialogs under niri, see files/system/usr/share/xdg-desktop-portal/niri-portals.conf
        - adw-gtk3-theme # GTK3 theme that understands Noctalia's libadwaita-style color templates
        - nwg-look # GUI to set gtk-theme-name/icon-theme/cursor-theme under niri (no DE settings app to do this otherwise)
        - forticlient # Fortinet VPN client, from the official fortinet.repo above
        - fuse # libfuse2 + fusermount, required by most AppImages (fuse3 alone isn't enough)
        - fuselib
        - mate-polkit # polkit auth agent for niri (no DE agent otherwise) — needed by FortiClient GUI etc.; autostarted via polkit-mate-agent.service user unit
        - gh # GitHub CLI
        - fcitx5 # input method
        - fcitx5-mozc 
        - fcitx5-configtool
        - fcitx5-gtk
        - fcitx5-qt

    remove:
      packages:
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - podman-docker # conflicts with docker-ce's /usr/bin/docker binary — pick one, not both

  - type: systemd
    system:
      enabled:
        - docker.service # docker-ce doesn't enable itself on install
    user:
      enabled:
        - polkit-mate-agent.service # polkit agent for niri, unit from files/system/usr/lib/systemd/user

  - type: script
    snippets:
      - git clone --depth=1 -b noctalia https://github.com/mahaveergurjar/sddm.git /tmp/sddm-noctalia-theme
      - mkdir -p /usr/share/sddm/themes
      - rm -rf /usr/share/sddm/themes/sddm
      - mv /tmp/sddm-noctalia-theme /usr/share/sddm/themes/sddm
      - git lfs install --system # install git lfs

  - type: brew # Homebrew/Linuxbrew, installed to /home/linuxbrew at first boot and kept updated
    nofile-limits: true # raise nofile limits, some brew formulae need more open files at build
    brew-analytics: false # disable telemetry

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - app.zen_browser.zen # Zen Browser
          - com.valvesoftware.Steam # Official Steam client
          - net.lutris.Lutris # Lutris game manager launcher
          - com.usebottles.bottles # Bottles for independent Wine prefixes
          - com.heroicgameslauncher.hgl # Heroic Games Launcher (Epic/GOG/Amazon)
          - it.mijorus.gearlever # Manage AppImages easily (Bazzite default choice)
          - net.davidotek.pupgui2 # Proton-GE Management
          - com.vscodium.codium
      - scope: user # Also add Flathub user repo, but no user packages

  - type: justfiles
    include:
      - noctalia.just


  - type: signing # this sets up the proper policy & signing files for signed images to work fully
