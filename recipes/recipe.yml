# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

# image will be published to ghcr.io/<user>/<name>
name: hyprland-nvidia-open-dx
# description will be included in the image's metadata
description: Customized wayblue/hyprland-nvidia-open with dx tools

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/wayblueorg/hyprland-nvidia-open
image-version: latest # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* into your image's root folder /

  - type: dnf
    repos:
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
      keys:
        - https://download.docker.com/linux/fedora/gpg
      copr:
        - atim/starship
      nonfree: rpmfusion # needed for the native steam package below
    install:
      packages:
        - micro
        - starship # shell
        - helix # cli ide
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        - mangohud # Performance, FPS, and hardware monitoring overlay
        - steam # native package, matches how Bazzite ships it (vs sandboxed Flatpak)
        # gamemode is already included in the wayblue base image, no need to reinstall it
    remove:
      packages:
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)
        - podman-docker # conflicts with docker-ce's /usr/bin/docker binary — pick one, not both

  - type: systemd
    system:
      enabled:
        - docker.service # docker-ce doesn't enable itself on install

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - app.zen_browser.zen # Zen Browser
          - net.lutris.Lutris # Lutris game manager launcher
          - com.usebottles.bottles # Bottles for independent Wine prefixes
          - com.heroicgameslauncher.hgl # Heroic Games Launcher (Epic/GOG/Amazon)
          - it.mijorus.gearlever # Manage AppImages easily (Bazzite default choice)
          - net.davidotek.pupgui2 # Proton-GE Management
          - com.vscodium.codium
      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
